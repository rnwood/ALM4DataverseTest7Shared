name: DEPLOY-main

# Stage-per-environment deployment workflow.
#
# Keep this simple:
#   1. Add one deploy-* job per environment.
#   2. For each higher stage set `needs` to the previous stage.
#   3. Set `promotion-mode` on each stage (or keep the default):
#      - manual-gate-tag      (GitHub Free compatible)
#      - environment-approval (auto-chain with environment approvals)
#   4. Add the `workflow_run` trigger only when using environment-approval.
#
# See docs/setup/github-setup.md

run-name: ${{ github.event_name == 'workflow_dispatch' && format('Deploy {0} <- {1}', github.event.inputs['target-environment'], github.event.inputs['build-run-name'] || github.event.inputs['build-run-id']) || format('Deploy auto <- {0}', github.event.workflow_run.display_title || github.event.workflow_run.id) }}

permissions:
  actions: read
  contents: write
  id-token: write

on:
  workflow_dispatch:
    inputs:
      build-run-name:
        description: 'Exact BUILD name to deploy (for example repo-main-2025-05-27T14:23:11Z-4). Numeric run IDs also work.'
        required: true
        type: string
      target-environment:
        description: 'Target environment to deploy to'
        # Make this not required when using `promotion-mode: environment-approval`:
        required: true
        type: choice
        options:
          - TEST-main
          - PROD
          # Add further environments here (UAT, STAGING, etc.) as needed.
          # Each option should have a matching deploy-* job below.
  # Add this trigger when using `promotion-mode: environment-approval`:
  # workflow_run:
  #   workflows: ['BUILD']
  #   types: [completed]
  #   branches: [main]

jobs:
  deploy-test:
    # First stage in the chain.
    # In manual-gate-tag mode this stage is manual too.
    uses: ALM4Dataverse/ALM4Dataverse/.github/workflows/deploy.yml@stable
    permissions:
      actions: read
      contents: write
      id-token: write
    with:
      environment-name: TEST-main
      previous-environment-name: ''
      promotion-mode: manual-gate-tag
      github-context-json: ${{ toJSON(github) }}
      caller-inputs-json: ${{ toJSON(inputs) }}
      timeout-minutes: 360
    secrets: inherit

  deploy-prod:
    # Higher stage example.
    # Allow manual targeted deploys even when prior jobs are skipped in this run,
    # but do not bypass failed prerequisite stages on automatic runs.
    needs: deploy-test
    if: ${{ github.event_name == 'workflow_dispatch' || needs['deploy-test'].result == 'success' }}
    uses: ALM4Dataverse/ALM4Dataverse/.github/workflows/deploy.yml@stable
    permissions:
      actions: read
      contents: write
      id-token: write
    with:
      environment-name: PROD
      previous-environment-name: TEST-main
      promotion-mode: manual-gate-tag
      github-context-json: ${{ toJSON(github) }}
      caller-inputs-json: ${{ toJSON(inputs) }}
      timeout-minutes: 360
    secrets: inherit
