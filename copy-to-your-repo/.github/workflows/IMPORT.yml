name: IMPORT

# Manually triggered: builds the current source and deploys it as unmanaged
# solutions into your development Dataverse environment.
#
# See docs/usage/importing-changes.md and docs/setup/github-setup.md

on:
  workflow_dispatch:

jobs:
  import:
    uses: rnwood/ALM4Dataverse/.github/workflows/import-reusable.yml@stable
    with:
      # Name of the GitHub environment that holds your dev Dataverse credentials.
      # Convention: Dev-{branch}, e.g. Dev-main.
      # For the prefixed global secrets approach, replace this with any placeholder
      # name and pass credentials explicitly via the secrets: block below.
      environment-name: Dev-${{ github.ref_name }}

      # Optional — only needed when NOT using a GitHub environment named above.
      # dataverse-url: ${{ vars.DEV_MAIN_DATAVERSE_URL }}

      # Connection references and environment variables as JSON objects.
      # Only needed when NOT using GitHub environment variables named
      # DataverseConnRef_* / DataverseEnvVar_*.
      # dataverse-connection-refs: ${{ vars.DEV_MAIN_DATAVERSE_CONN_REFS }}
      # dataverse-env-vars:        ${{ vars.DEV_MAIN_DATAVERSE_ENV_VARS }}

    # Credentials come from the GitHub environment named above.
    # When using the prefixed global secrets approach, pass them here instead:
    secrets: inherit
    # secrets:
    #   azure-client-id:             ${{ secrets.DEV_MAIN_AZURE_CLIENT_ID }}
    #   azure-client-secret:         ${{ secrets.DEV_MAIN_AZURE_CLIENT_SECRET }}
    #   azure-tenant-id:             ${{ secrets.DEV_MAIN_AZURE_TENANT_ID }}
    #   dataverse-service-account-upn: ${{ secrets.DEV_MAIN_DATAVERSE_SERVICE_ACCOUNT_UPN }}
