name: Import (Reusable)

# Reusable workflow: build the current source and deploy it as unmanaged solutions
# to a development Dataverse environment ("import from source").
#
# Call this from your repo's IMPORT.yml:
#   uses: rnwood/ALM4Dataverse/.github/workflows/import-reusable.yml@stable
#
# CREDENTIALS — two supported approaches (see docs/config/github-secrets.md):
#
#   1. GitHub Environments (recommended for Teams/Enterprise):
#      Store AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_CLIENT_SECRET, DATAVERSE_URL,
#      and DATAVERSESERVICEACCOUNTUPN as secrets/variables in a GitHub environment
#      named after the dev environment (e.g. "Dev-main").
#      Individual DataverseConnRef_* and DataverseEnvVar_* variables can also be
#      stored in the GitHub environment and will be picked up automatically.
#
#   2. Prefixed global secrets (works on all licence levels):
#      Store secrets at repo level with environment-specific prefixes and pass
#      them explicitly. Connection references and environment variables can be
#      supplied as JSON objects via dataverse-connection-refs / dataverse-env-vars.

on:
  workflow_call:
    inputs:
      environment-name:
        required: true
        type: string
        description: >
          Name of the GitHub environment to use (e.g. "Dev-main").
          If the environment does not exist in GitHub it will be created automatically
          with no protection rules.  Used to resolve credentials from GitHub environment
          secrets/variables when they are not passed explicitly.
      dataverse-url:
        type: string
        default: ''
        description: >
          URL of the Dataverse environment to import into.
          If omitted, DATAVERSE_URL from the GitHub environment is used.
      dataverse-connection-refs:
        type: string
        default: ''
        description: >
          JSON object mapping Dataverse connection reference schema names to
          connection IDs.  Example: {"contoso_sharedsharepointonline": "guid"}.
          Only needed when NOT using GitHub environment variables named
          DataverseConnRef_<schema_name>.
      dataverse-env-vars:
        type: string
        default: ''
        description: >
          JSON object mapping Dataverse environment variable schema names to
          values.  Example: {"contoso_APIEndpoint": "https://api.contoso.com"}.
          Only needed when NOT using GitHub environment variables named
          DataverseEnvVar_<schema_name>.
      alm-repository:
        type: string
        default: 'rnwood/ALM4Dataverse'
        description: 'ALM4Dataverse repository to use (change this if you are using a fork)'
      alm-ref:
        type: string
        default: 'stable'
        description: 'ALM4Dataverse git ref (tag or branch) to use'
    secrets:
      azure-client-id:
        required: false
        description: >
          Azure app registration client ID.
          If omitted, AZURE_CLIENT_ID from the GitHub environment is used.
      azure-client-secret:
        required: false
        description: >
          Azure client secret value.
          If omitted, AZURE_CLIENT_SECRET from the GitHub environment is used.
      azure-tenant-id:
        required: false
        description: >
          Azure tenant (directory) ID.
          If omitted, AZURE_TENANT_ID from the GitHub environment is used.
      dataverse-service-account-upn:
        required: false
        description: >
          UPN (email) of the Dataverse service account used to activate
          workflows/flows after import.
          If omitted, DATAVERSESERVICEACCOUNTUPN from the GitHub environment is used.

jobs:
  import:
    runs-on: windows-latest
    environment: ${{ inputs.environment-name }}
    env:
      AZURE_CLIENT_ID:     ${{ secrets.azure-client-id     || secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID:     ${{ secrets.azure-tenant-id     || secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.azure-client-secret || secrets.AZURE_CLIENT_SECRET }}
      DATAVERSE_URL:       ${{ inputs.dataverse-url || vars.DATAVERSE_URL || secrets.DATAVERSE_URL }}
      DATAVERSESERVICEACCOUNTUPN: >-
        ${{ secrets.dataverse-service-account-upn
            || secrets.DATAVERSESERVICEACCOUNTUPN
            || vars.DATAVERSESERVICEACCOUNTUPN }}
      DATAVERSE_CONNECTION_REFS: ${{ inputs.dataverse-connection-refs }}
      DATAVERSE_ENV_VARS:        ${{ inputs.dataverse-env-vars }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          path: self
          fetch-depth: 1

      - name: Checkout ALM4Dataverse
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.alm-repository }}
          ref: ${{ inputs.alm-ref }}
          path: alm

      - name: Install Dependencies, Connect and Import
        shell: pwsh
        working-directory: ${{ github.workspace }}/self
        run: |
          # Apply connection references from JSON input.
          # When using GitHub Environments, individual DataverseConnRef_* variables
          # configured in the environment are already present as OS environment
          # variables and will be picked up directly by deploy.ps1.
          if (-not [string]::IsNullOrEmpty($env:DATAVERSE_CONNECTION_REFS)) {
            $connRefs = $env:DATAVERSE_CONNECTION_REFS | ConvertFrom-Json
            foreach ($prop in $connRefs.PSObject.Properties) {
              [System.Environment]::SetEnvironmentVariable("DataverseConnRef_$($prop.Name)", $prop.Value)
            }
          }

          # Apply Dataverse environment variable values from JSON input.
          if (-not [string]::IsNullOrEmpty($env:DATAVERSE_ENV_VARS)) {
            $envVars = $env:DATAVERSE_ENV_VARS | ConvertFrom-Json
            foreach ($prop in $envVars.PSObject.Properties) {
              [System.Environment]::SetEnvironmentVariable("DataverseEnvVar_$($prop.Name)", $prop.Value)
            }
          }

          & "${{ github.workspace }}/alm/pipelines/scripts/installdependencies.ps1"
          & "${{ github.workspace }}/alm/pipelines/scripts/connect.ps1" -Url $env:DATAVERSE_URL
          & "${{ github.workspace }}/alm/pipelines/scripts/import.ps1" `
            -SourceDirectory "${{ github.workspace }}/self" `
            -ArtifactStagingDirectory "${{ runner.temp }}/import-staging"
